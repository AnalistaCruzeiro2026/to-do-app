<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Agenda Pro</title>

  <link rel="stylesheet" href="style.css">
</head>

<body>

  <div class="container">
    <h1>📅 Agenda Pro</h1>
    <div class="stats" id="stats"></div>

    <div class="input-group">
      <input type="text" id="taskInput" placeholder="Nova tarefa...">

      <input type="date" id="date">
      <input type="time" id="time">

      <select id="priority">
        <option value="alta">Alta</option>
        <option value="media">Média</option>
        <option value="baixa">Baixa</option>
      </select>

      <button onclick="addTask()">+</button>
    </div>

    <ul id="taskList"></ul>
  </div>

  <script>
    let tasks = JSON.parse(localStorage.getItem("tasks")) || [];

    function save() {
      localStorage.setItem("tasks", JSON.stringify(tasks));
    }

    function addTask() {
      const text = document.getElementById("taskInput").value;
      const date = document.getElementById("date").value;
      const time = document.getElementById("time").value;
      const priority = document.getElementById("priority").value;

      if (!text) return;

      tasks.push({ text, date, time, priority, done: false });

      document.getElementById("taskInput").value = "";
      save();
      render();
    }

    function acceptTask(index) {
      tasks[index].done = true;
      save();
      render();
    }

    function deleteTask(index) {
      tasks.splice(index, 1);
      save();
      render();
    }

    function render() {
      const list = document.getElementById("taskList");
      list.innerHTML = "";

      tasks.forEach((task, i) => {
        const li = document.createElement("li");
        li.className = task.priority + (task.done ? " done" : "");

        li.innerHTML = `
          <div class="info">
            <strong>${task.text}</strong>
            <span>📅 ${task.date || "Sem data"}</span>
            <span>⏰ ${task.time || "Sem hora"}</span>
          </div>

          <div class="actions">
            <button class="ok" onclick="acceptTask(${i})">✔</button>
            <button class="del" onclick="deleteTask(${i})">✖</button>
          </div>
        `;

        list.appendChild(li);
      });

      document.getElementById("stats").innerText =
        `${tasks.length} tarefas | ${tasks.filter(t => t.done).length} concluídas`;
    }

    render();
  </script>

</body>
</html>
